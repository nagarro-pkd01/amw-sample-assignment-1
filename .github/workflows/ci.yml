name: CI Pipeline

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - main

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------
      # SETUP NODE
      # -------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # -------------------------
      # SETUP PNPM
      # -------------------------
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # -------------------------
      # GET PNPM STORE
      # -------------------------
      - name: Get PNPM Store Directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      # -------------------------
      # CACHE PNPM
      # -------------------------
      - name: Setup PNPM Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # -------------------------
      # INSTALL
      # -------------------------
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      # -------------------------
      # LINT
      # -------------------------
      - name: Run ESLint
        run: pnpm lint

      # -------------------------
      # BUILD
      # -------------------------
      - name: Build Applications
        run: pnpm build

  playwright:
    needs: lint-and-build

    # -------------------------
    # RUN ONLY FOR PR + MAIN
    # -------------------------
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------
      # SETUP NODE
      # -------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # -------------------------
      # SETUP PNPM
      # -------------------------
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # -------------------------
      # GET PNPM STORE
      # -------------------------
      - name: Get PNPM Store Directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      # -------------------------
      # CACHE PNPM
      # -------------------------
      - name: Setup PNPM Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # -------------------------
      # INSTALL
      # -------------------------
      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      # -------------------------
      # BUILD
      # -------------------------
      - name: Build Applications
        run: pnpm build

      # -------------------------
      # INSTALL PLAYWRIGHT
      # -------------------------
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      # -------------------------
      # START BACKEND
      # -------------------------
      - name: Start Backend
        run: |
          pnpm --filter express start > backend.log 2>&1 &
          sleep 10
          cat backend.log

      # -------------------------
      # START FRONTEND
      # -------------------------
      - name: Start Frontend
        run: |
          pnpm --filter react dev -- --host 0.0.0.0 > frontend.log 2>&1 &

      # -------------------------
      # WAIT FOR BACKEND
      # -------------------------
      - name: Wait for Backend
        run: |
          npx wait-on http://localhost:3000 --timeout 30000

      # -------------------------
      # WAIT FOR FRONTEND
      # -------------------------
      - name: Wait for Frontend
        run: npx wait-on http://localhost:5173 --timeout 30000

      # -------------------------
      # RUN PLAYWRIGHT
      # -------------------------
      - name: Run Playwright Tests
        run: pnpm test:e2e

      # -------------------------
      # SHOW LOGS ON FAILURE
      # -------------------------
      - name: Show Backend Logs
        if: failure()
        run: cat backend.log

      - name: Show Frontend Logs
        if: failure()
        run: cat frontend.log